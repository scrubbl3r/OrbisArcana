<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orb VFX Tester — Electric AOE + Shield + Shockwave</title>
  <link rel="stylesheet" href="../shell/lab-workspaces.css?v=20260425a" />
  <link rel="stylesheet" href="../../src/runtime-shell/ui/staging-ui.css?v=20260410-vfxlab-semantics" />
  <style>
    :root{
      --g: var(--text-strong);
      --bg: rgb(5, 5, 6);
      --panel: rgba(10,10,12,.92);
      --border: var(--frame);
      --shield-r: 120;
      --shield-g: 210;
      --shield-b: 255;

      /* Orb (receiver orb size) */
      --orb-d: 100px;
      --orb-stroke: 2px;
      --orb-stroke-color: rgb(255,255,255);
      --orb-fill: rgba(255,255,255,0.20);

      /* Shield */
      --shield-d: 124px;
      --shield-stroke: 4px;

      /* Shield alpha (also used to clamp pulse max) */
      --shield-alpha: 1.00;
      --shield-fade: 1;

      /* Pulse controls (only active while shield is ON) — screenshot defaults */
      --shield-pulse-ms: 80ms;
      --shield-pulse-min: 0.30;
      --shield-pulse-max: 1.00;

      /* Shockwave */
      --shock-color: rgba(255, 255, 255, 0.65);
      --shock-stroke: 4px;

      /* Flame AOE */
      --flame-d: 200px;
      --flame-duration: 10000ms;
      --flame-stroke: rgba(255, 96, 24, 1);
      --flame-fill: rgba(255, 96, 24, 0.20);

      /* Electric AOE */
      --electric-d: 240px;
      --electric-duration: 10000ms;
      --electric-glow: rgba(120, 215, 255, 1);
      --lab-workspace-nav-muted: var(--text-muted);
      --lab-workspace-nav-active: var(--text-strong);
    }

    *, *::before, *::after{ box-sizing: border-box; }

    html,body{
      min-height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow-x:hidden;
      overflow-y:auto;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(1200px 700px at 50% 35%, rgba(0,0,0,.0) 0%, rgba(0,0,0,.45) 55%, rgba(0,0,0,.75) 100%);
      opacity:0.95;
      mix-blend-mode:multiply;
      z-index:0;
    }

    .wrap{
      position:relative;
      z-index:1;
      max-width:1080px;
      margin:22px auto;
      padding:0 16px 48px;
      display:grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap:16px;
      align-items:start;
    }
    .studioBar{
      grid-column:1 / -1;
      background:var(--panel);
      border:1px solid var(--frame);
      border-radius:16px;
      padding:10px 12px;
      box-shadow: 0 18px 80px rgba(0,0,0,.45);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .studioBarGroup{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .studioWorkspaceGroup{
      min-width:100%;
      justify-content:space-between;
    }
    .studioBarLabel{
      font-size:12px;
      color: var(--text-muted);
      font-weight:800;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--frame);
      border-radius:16px;
      padding:14px 14px 16px;
      box-shadow: 0 18px 80px rgba(0,0,0,.55);
      overflow:hidden;
    }

    .title{
      font-weight:1000;
      letter-spacing:.3px;
      margin-bottom:10px;
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      gap:10px;
    }
    .title .dim{opacity:.7; font-weight:800; font-size:12px;}
    .titleTools{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .titleTools label{
      font-size:12px;
      opacity:.8;
      font-weight:800;
    }
    .effectSelect{
      background: rgba(var(--frame-rgb), 0.12);
      color: var(--text);
      border:1px solid var(--frame);
      border-radius:10px;
      padding:6px 8px;
      font: inherit;
      font-size:12px;
      font-weight:800;
    }
    .toolBtn{
      background: rgba(var(--frame-rgb), 0.12);
      color: var(--text);
      border:1px solid var(--frame);
      border-radius:10px;
      padding:6px 8px;
      font: inherit;
      font-size:11px;
      font-weight:900;
      cursor:pointer;
    }
    .toolBtn:hover{
      border-color: var(--frame-strong);
      color: var(--text-strong);
    }
    .toolBtn.secondary{
      opacity:.9;
    }
    .toolBtn[disabled]{
      opacity:.38;
      cursor:not-allowed;
    }
    .lockBtn{
      min-width:44px;
      min-height:34px;
      padding:4px 8px;
      font-size:0;
      line-height:1;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-left:4px;
      position:relative;
      overflow:visible;
      color: var(--text);
      text-shadow: none;
    }
    .lockBtn::before{
      content:"";
      position:absolute;
      width:14px;
      height:10px;
      left:50%;
      top:58%;
      transform:translate(-50%,-50%);
      border:2px solid currentColor;
      border-radius:3px;
      box-shadow: inset 0 0 8px rgba(255,255,255,.04);
      background: rgba(255,255,255,.02);
      z-index:2;
    }
    .lockBtn::after{
      content:"";
      position:absolute;
      width:12px;
      height:9px;
      left:50%;
      top:22%;
      border:2px solid currentColor;
      border-bottom:none;
      border-radius:10px 10px 0 0;
      transform:translateX(-50%);
      transform-origin: 2px 100%;
      z-index:1;
    }
    .lockBtn.unlocked::after{
      transform:translateX(-58%) rotate(-42deg);
    }
    .lockBtn.locked::after{
      transform:translateX(-50%) rotate(0deg);
    }
    .numField{
      width:120px;
      background: rgba(0,0,0,.45);
      color: var(--text);
      border:1px solid var(--frame);
      border-radius:8px;
      padding:6px 8px;
      font: inherit;
      font-size:12px;
      font-weight:800;
    }
    .inlineField{
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .authoringTabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      border-radius: 12px;
      border: 1px solid var(--frame);
      background: rgba(0,0,0,.18);
      padding:6px;
      margin:0 0 12px;
    }
    .authoringTab{
      cursor:pointer;
      border-radius:9px;
      border:1px solid transparent;
      background:transparent;
      color:var(--text-muted);
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      padding:9px 10px;
    }
    .authoringTab.active{
      border-color:rgba(var(--frame-rgb), .36);
      background:rgba(var(--frame-rgb), .14);
      color: var(--text-strong);
    }
    .authoringPanel{
      display:block;
    }
    .authoringPanel[hidden]{
      display:none;
    }
    .behaviorSection{
      border-top:1px solid rgba(var(--frame-rgb), .18);
      padding-top:12px;
      margin-top:12px;
    }
    .behaviorSection:first-child{
      border-top:none;
      padding-top:0;
      margin-top:0;
    }
    .behaviorSection[hidden]{ display:none; }
    .behaviorTitle{
      margin:0 0 10px;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--text-strong);
    }
    .behaviorReadout{
      margin-top:10px;
      border:1px solid rgba(var(--frame-rgb), .18);
      border-radius:10px;
      background:rgba(0,0,0,.22);
      color:var(--text-muted);
      font-size:12px;
      font-weight:800;
      line-height:1.35;
      padding:9px 10px;
    }
    .bindingPanel{
      margin: 0;
      padding: 10px 12px;
      border: 1px solid rgba(var(--frame-rgb), 0.18);
      border-radius:12px;
      background: rgba(0,0,0,.25);
      display:grid;
      gap:8px;
    }
    .bindingEditor{
      display:grid;
      gap:8px;
      margin:0 0 4px;
      padding:0 0 10px;
      border-bottom:1px solid rgba(var(--frame-rgb), 0.16);
    }
    .bindingEditorRow{
      display:grid;
      gap:6px;
    }
    .bindingEditorLabel{
      font-size:11px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color: var(--text-muted);
    }
    .bindingEditorHelp{
      font-size:12px;
      line-height:1.35;
      color: var(--text-muted);
    }
    .bindingEditorHelp:empty{
      display:none;
    }
    .bindingSelect{
      width:100%;
      min-height:36px;
      border-radius:10px;
      border:1px solid var(--frame);
      background: rgba(0,0,0,.45);
      color: var(--text);
      padding:6px 10px;
      font: inherit;
      font-size:12px;
      font-weight:800;
    }
    .bindingPanel h3{
      margin:0;
      font-size:12px;
      font-weight:900;
      letter-spacing:.06em;
      color: var(--text-strong);
      text-transform:uppercase;
    }
    .bindingGrid{
      display:grid;
      grid-template-columns: 118px 1fr;
      gap:6px 8px;
      font-size:12px;
      line-height:1.35;
    }
    .bindingGrid .k{ color: var(--text-muted); font-weight:800; }
    .bindingGrid .v{ color: var(--text-strong); word-break: break-word; }
    .paramFieldRows,
    .paramGrid{
      display:grid;
      gap:10px;
      margin-top:10px;
    }
    .paramFieldRow,
    .paramField{
      display:grid;
      grid-template-columns: minmax(110px, auto) 1fr auto;
      gap:8px;
      align-items:center;
    }
    .paramFieldRow label,
    .paramField label{
      font-size:12px;
      font-weight:900;
      color: var(--text-strong);
    }
    .paramFieldInput{
      width:100%;
      min-height:34px;
      background: rgba(0,0,0,.45);
      color: var(--text);
      border:1px solid var(--frame);
      border-radius:8px;
      padding:6px 8px;
      font: inherit;
      font-size:12px;
      font-weight:800;
    }
    .rgbaParamRow{
      display:grid;
      grid-template-columns: auto repeat(4, auto minmax(54px, 1fr)) auto;
      gap:8px;
      align-items:center;
    }
    .rgbaParamRow.rgbParamRow{
      grid-template-columns: auto repeat(3, auto minmax(54px, 1fr)) auto;
    }
    .rgbaParamRow .rgbaLabel,
    .rgbaParamRow label{
      font-size:12px;
      font-weight:900;
      color: var(--text-strong);
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .stage{
      height:min(50vh, 520px);
      border:1px solid var(--frame);
      border-radius:14px;
      background:#000;
      position:relative;
      overflow:hidden;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.25);
    }

    .previewLane{
      position:absolute;
      left:50%;
      top:50%;
      width:0;
      height:0;
      pointer-events:none;
    }
    [data-preview-root][hidden]{
      display:none;
    }

    .atOrigin{
      position:absolute;
      left:0;
      top:0;
      transform: translate(-50%,-50%);
      pointer-events:none;
    }
    .orbShatterLayer{
      position:absolute;
      left:0;
      top:0;
      width:240px;
      height:240px;
      overflow:visible;
      transform: translate(-50%,-50%);
      pointer-events:none;
    }
    .orbTemplatePatternLayer{
      position:absolute;
      left:0;
      top:0;
      width:var(--orb-d);
      height:var(--orb-d);
      overflow:visible;
      transform: translate(-50%,-50%);
      pointer-events:none;
    }

    .orb{
      width: var(--orb-d);
      height: var(--orb-d);
      border-radius: 999px;
      border: 0;
      background: var(--orb-fill);
      box-shadow: none;
      position: relative;
    }
    .orb::after{
      content:"";
      position:absolute;
      inset: calc(-1 * var(--orb-stroke));
      border-radius:999px;
      border: var(--orb-stroke) solid var(--orb-stroke-color);
      pointer-events:none;
    }
    .orbInterior{
      position:absolute;
      left:0;
      top:0;
      width: var(--orb-d);
      height: var(--orb-d);
      transform: translate(-50%,-50%);
      border-radius:999px;
      overflow:hidden;
      pointer-events:none;
    }
    .orbGlobePreviewLayer{
      position:absolute;
      left:0;
      top:0;
      width:0;
      height:0;
      pointer-events:none;
      overflow:visible;
    }
    .worldGlobeSamples{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:44px;
      pointer-events:none;
    }
    .worldGlobeSample{
      min-width:86px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      color:var(--muted);
      font-size:10px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .worldGlobeSample > div:first-child{
      position:relative;
      left:auto;
      top:auto;
      box-sizing:border-box;
    }
    .worldGlobeSampleLabel{
      opacity:.78;
    }
    .innerGlobe{
      position:absolute;
      border-radius:999px;
      background: rgba(255,214,64,1);
      box-shadow: inset 0 0 0 var(--orb-globe-inner-stroke) rgba(255,214,64,0.96), 0 0 6px rgba(255,214,64,0.22);
      box-sizing:border-box;
      pointer-events:none;
    }
    .releasedGlobe{
      position:absolute;
      border-radius:999px;
      border: var(--orb-globe-released-stroke) solid rgba(255,214,64,0.96);
      background: rgba(255,214,64,0.42);
      box-shadow: inset 0 0 0 1px rgba(255,239,168,0.38), 0 0 10px rgba(255,214,64,0.28);
      box-sizing:border-box;
      pointer-events:none;
    }
    .orbitGlobe{
      position:absolute;
      border-radius:999px;
      border: var(--orb-globe-orbit-stroke) solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.10);
      box-shadow:none;
      box-sizing:border-box;
      pointer-events:none;
    }
    .pickupGlobe{
      position:absolute;
      width: var(--orb-globe-pickup-d);
      height: var(--orb-globe-pickup-d);
      border-radius:999px;
      border: 2px solid rgba(255,214,64,0.96);
      background: rgba(255,214,64,0.42);
      box-sizing:border-box;
      filter: drop-shadow(0 0 8px rgba(255,214,64,0.28));
      pointer-events:none;
      z-index:6;
    }
    .orbShard{
      fill: var(--orb-fill);
      stroke: var(--orb-stroke-color);
      stroke-width: var(--orb-fracture-shard-stroke);
      vector-effect: non-scaling-stroke;
      stroke-linejoin:round;
      stroke-linecap:round;
      filter: drop-shadow(
        0 0 var(--orb-fracture-glow-blur)
        color-mix(in srgb, var(--orb-stroke-color) calc(var(--orb-fracture-glow-alpha) * 100%), transparent)
      );
    }

    .shield{
      width: var(--shield-d);
      height: var(--shield-d);
      border-radius: 999px;

      opacity:0;
      filter: opacity(var(--shield-fade));
      transform: translate(-50%,-50%) scale(0.96);
      transform-origin: 50% 50%;

      border: var(--shield-stroke) solid rgba(var(--shield-r), var(--shield-g), var(--shield-b), 0.0);
      background: radial-gradient(circle at 45% 35%,
        rgba(var(--shield-r), var(--shield-g), var(--shield-b), 0.12) 0%,
        rgba(var(--shield-r), var(--shield-g), var(--shield-b), 0.05) 40%,
        rgba(var(--shield-r), var(--shield-g), var(--shield-b), 0.00) 75%);
      transition:
        opacity 120ms linear,
        transform 120ms ease-out,
        border-color 120ms linear;
      box-shadow:none;
      mix-blend-mode: screen;
    }

    @keyframes shieldPulseAlpha {
      0%   { opacity: var(--shield-pulse-min); }
      50%  { opacity: var(--shield-pulse-max); }
      100% { opacity: var(--shield-pulse-min); }
    }

    /* Pulse only while ON */
    .shield.on{
      transform: translate(-50%,-50%) scale(1.02);
      border-color: rgba(var(--shield-r), var(--shield-g), var(--shield-b), 0.85);
      transition: none;
      animation: shieldPulseAlpha var(--shield-pulse-ms) linear infinite;
    }

    .shockLayer{
      position:absolute;
      left:0;
      top:0;
      width:0;
      height:0;
      pointer-events:none;
      overflow:visible;
    }
    .shockSvg{
      position:absolute;
      left:0;
      top:0;
      transform: translate(-50%,-50%);
      overflow:visible;
      pointer-events:none;
    }
    .flameLayer{
      position:absolute;
      left:0;
      top:0;
      width:0;
      height:0;
      pointer-events:none;
      overflow:visible;
      z-index: 3;
      mix-blend-mode: screen;
    }
    .flameSvg{
      position:absolute;
      left:0;
      top:0;
      transform: translate(-50%,-50%);
      overflow:visible;
      pointer-events:none;
    }
    .electricLayer{
      position:absolute;
      left:0;
      top:0;
      width:0;
      height:0;
      pointer-events:none;
      overflow:visible;
      z-index: 4;
      mix-blend-mode: screen;
    }
    .electricSvg{
      position:absolute;
      left:0;
      top:0;
      transform: translate(-50%,-50%);
      overflow:visible;
      pointer-events:none;
    }

    .section{
      border-top:1px solid rgba(var(--frame-rgb), .18);
      padding-top:12px;
      margin-top:12px;
    }
    .section:first-child{
      border-top:none;
      padding-top:0;
      margin-top:0;
    }
    .section[hidden]{ display:none; }
    [data-preview-layer][hidden]{ display:none !important; }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .orbGlobeActions{
      flex-wrap:nowrap;
      gap:6px;
    }
    .orbGlobeActions button{
      flex:1 1 0;
      min-width:0;
      padding:8px 8px;
      white-space:nowrap;
    }

    button{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--frame);
      background:rgba(var(--frame-rgb), .12);
      color:var(--text);
      cursor:pointer;
      font-weight:1000;
      white-space:nowrap;
    }
    button:hover{border-color:var(--frame-strong); color:var(--text-strong)}
    button:disabled{ opacity:.55; cursor:default; }

    .sliderRow{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
      font-size:12px;
      opacity:.92;
      margin-top:10px;
    }
    .sliderRow strong{ font-weight: 1000; opacity:1; }
    input[type="range"]{
      width:100%;
      margin-top:8px;
      accent-color: var(--emphasis);
    }

    .hint{
      margin-top:10px;
      font-size:11px;
      opacity:.75;
      line-height:1.35;
    }

    @media (max-width: 960px){
      .wrap{ grid-template-columns: 1fr; }
      .studioBar{
        align-items:stretch;
      }
      .studioBarGroup{
        width:100%;
      }
      .effectSelect{
        flex:1;
        min-width:180px;
      }
      .stage{ height:min(50vh, 520px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="studioBar" role="toolbar" aria-label="VFX studio effect library and profile actions">
      <div class="studioBarGroup studioWorkspaceGroup">
        <nav data-lab-workspace-nav></nav>
      </div>
      <div class="studioBarGroup">
        <label class="studioBarLabel" for="effectSelect">Effect</label>
        <select id="effectSelect" class="effectSelect" aria-label="Select effect controls">
          <option value="bubble-shield" data-registry-id="spell.shield_bubble" data-base-effect="bubble-shield" data-category="spell" data-locked="true" selected>Bubble Shield</option>
          <option value="electric-aoe" data-registry-id="spell.aoe_electric" data-base-effect="electric-aoe" data-category="spell" data-locked="true">Electric AOE</option>
          <option value="flame-aoe" data-registry-id="spell.aoe_flame" data-base-effect="flame-aoe" data-category="spell" data-locked="true">Flame AOE</option>
          <option value="shockwave" data-registry-id="spell.shockwave_ring" data-base-effect="shockwave" data-category="spell" data-locked="true">Shockwave</option>
        </select>
      </div>
      <div class="studioBarGroup">
        <button id="newEffectBtn" class="toolBtn" type="button">New</button>
        <button id="renameEffectBtn" class="toolBtn" type="button">Rename</button>
        <button id="duplicateEffectBtn" class="toolBtn" type="button">Duplicate</button>
        <button id="deleteEffectBtn" class="toolBtn" type="button">Delete</button>
        <button id="saveDraftBtn" class="toolBtn secondary" type="button">Save</button>
        <button id="connectProjectBtn" class="toolBtn secondary" type="button">Connect Project</button>
        <button id="publishPresetBtn" class="toolBtn secondary" type="button">Publish</button>
        <button id="lockEffectBtn" class="toolBtn lockBtn unlocked" type="button" aria-label="Lock effect profile" title="Lock effect profile"></button>
      </div>
    </div>

    <div class="card">
      <div class="stage" id="stage" aria-label="Preview stage">
        <div class="previewLane" id="shieldPreviewRoot" data-preview-root hidden aria-hidden="true">
          <div class="shield atOrigin" id="shieldLaneShield"></div>
          <div class="orb atOrigin" id="shieldLaneOrb"></div>
        </div>
        <div class="previewLane" id="shockPreviewRoot" data-preview-root hidden aria-hidden="true">
          <div class="shockLayer" id="shockLaneLayer"></div>
          <div class="orb atOrigin" id="shockLaneOrb"></div>
        </div>
        <div class="previewLane" id="flamePreviewRoot" data-preview-root hidden aria-hidden="true">

    function publishPreset(){
      const selectedBase = String(selectedBaseEffect() || "");
      const publishContract = publishContractForBaseEffect(selectedBase);
      if (isSelectedEffectLocked() && !(publishContract && publishContract.livePreset)) {
        window.alert(publishContract && publishContract.publishNote
          ? publishContract.publishNote
          : "This effect profile is locked. Unlock it to publish a preset.");
        return;
      }
      void (async () => {
        const built = buildPublishedPresetPayload();
        if (!built) return;
        const contract = publishContractForBaseEffect(String(built.payload.baseEffect || ""));
        const result = await publishLabPreset({
          built,
          contract,
          buildLivePresetModule: LIVE_PRESET_BUILDERS_BY_BASE_EFFECT[String(built.payload.baseEffect || "")] || null,
          buildBehaviorModule: LIVE_BEHAVIOR_BUILDERS_BY_BASE_EFFECT[String(built.payload.baseEffect || "")] || null,
          ensureProjectConnected: async () => {
            if (projectRootDirHandle || !window.showDirectoryPicker) return !!projectRootDirHandle;
            return studioProjectIo.connect();
          },
          hasProjectConnection: !!projectRootDirHandle,
          saveConnectedPath: studioProjectIo.savePath,
          saveConnectedDraft: studioProjectIo.saveDraft,
          saveProjectFile: saveTextToProjectFile,
          downloadTextFile,
          draftPathParts: VFX_PRESET_DRAFTS_PATH,
          describePublishSuccess: describePublishSuccessHelper,
        });
        if (result && result.message) window.alert(result.message);
      })();
    }

    function publishBinding(){
      if (isSelectedEffectLocked()) {
        window.alert("This effect profile is locked. Unlock it to publish a binding.");
        return;
      }
      const opt = selectedEffectOption();
      if (!opt) {
        window.alert("Select an effect profile before publishing a binding.");
        return;
      }
      const selectedTargetRegistryId = String((els.bindingTargetSelect && els.bindingTargetSelect.value) || "").trim().toLowerCase();
      if (!selectedTargetRegistryId) {
        window.alert("Choose a runtime target to bind first.");
        return;
      }
      const runtimeTarget = getRuntimeEffectTarget(selectedTargetRegistryId);
      if (!runtimeTarget) {
        window.alert("The selected runtime target could not be resolved.");
        return;
      }
      const registryId = String(opt.dataset.registryId || "").trim();
      if (!registryId) {
        window.alert("This profile is missing a registry effect id, so it cannot publish a runtime binding yet.");
        return;
      }
      const registryEntry = findRegistryEntry(VFX_EFFECT_REGISTRY, registryId);
      if (!supportsBindingPublish(registryEntry)) {
        window.alert("This effect does not currently support binding publish.");
        return;
      }
      if (!projectRootDirHandle) {
        window.alert(`Connect Project first. Bind writes to the fixed repo path ${RUNTIME_BINDINGS_TARGET_PATH.join("/")}.`);
        return;
      }

      const built = buildPublishedPresetPayload();
      if (!built || !built.payload) {
        window.alert("Could not build the selected preset payload for binding publish.");
        return;
      }

      const publishPlan = buildBindingPublishPlan({
        runtimeEffectBindings: runtimeEffectBindingsState,
        runtimeTarget,
        registryId,
        builtPayload: built,
        registryEntry,
        buildRuntimeEffectBindingsModule,
      });

      (async () => {
        const result = await writeRuntimeBindingModule({
          moduleText: publishPlan.moduleText,
          targetPath: publishPlan.targetPath,
          hasProjectConnection: !!projectRootDirHandle,
          saveConnectedPath: studioProjectIo.savePath,
          missingConnectionMessage: `Connect Project first. Bind writes to the fixed repo path ${RUNTIME_BINDINGS_TARGET_PATH.join("/")}.`,
          failureMessage: "Binding publish failed. No fallback export was created. Reconnect the project and try again.",
        });
        if (result && result.ok) {
          runtimeEffectBindingsState = publishPlan.nextBindings;
          refreshBindingPanel();
          if (result.message) window.alert(result.message);
          return;
        }
        if (result && result.aborted) return;
        if (result && result.error) console.error(result.error);
        if (result && result.message) window.alert(result.message);
      })();
    }

      if (!draftHydrationDone || suspendDraftApply) return;
      const opt = selectedEffectOption();
      if (!opt) return;
      const baseEffect = String(opt.dataset.baseEffect || selectedBaseEffect() || "");
      if (!isCustomEffectOption(opt)) {
        applyCurrentEffectSettings(baseEffect, defaultSettingsForBaseEffect(baseEffect));
        return;

      const profile = draftStore.profilesByValue[String(opt.value || "")];
      if (!profile) return;
      const profileBaseEffect = String(opt.dataset.baseEffect || profile.baseEffect || "");
      const settingsByBase = profile.settingsByBaseEffect && typeof profile.settingsByBaseEffect === "object"
        ? profile.settingsByBaseEffect
        : null;
      if (!settingsByBase) return;
      const settingsKey = settingsKeyForBaseEffect(profileBaseEffect);
      const settings = settingsByBase[settingsKey] || settingsByBase[profileBaseEffect];
      if (settings) applyCurrentEffectSettings(profileBaseEffect, settings);
    }

    function deleteEffectProfile(){
      const opt = selectedEffectOption();
      if (!opt || !els.effectSelect) return;
      if (String(opt.dataset.locked || "") === "true") {
        window.alert("This effect profile is locked. Unlock it to delete.");
        return;
      }
      const label = String(opt.textContent || opt.value || "this effect");
      const built = buildPublishedPresetPayload();
      const presetId = String((built && built.payload && built.payload.presetId) || "").trim();
      const affectedBindings = collectBindingsForPresetId(runtimeEffectBindingsState, presetId);
      if (affectedBindings.length && !projectRootDirHandle) {
        window.alert(`Connect Project first. This profile is bound in ${RUNTIME_BINDINGS_TARGET_PATH.join("/")} and deletion needs to clean that file.`);
        return;
      }
      const bindingWarning = affectedBindings.length
        ? `\n\nThis will also remove ${affectedBindings.length} runtime target binding${affectedBindings.length === 1 ? "" : "s"} that point at preset ${presetId}.`
        : "";
      if (!window.confirm(`Delete effect profile \"${label}\"?${bindingWarning}`)) return;

      (async () => {
        if (affectedBindings.length) {
          const cleanupPlan = buildBindingCleanupPlan({
            runtimeEffectBindings: runtimeEffectBindingsState,
            affectedBindings,
            buildRuntimeEffectBindingsModule,
          });
          const result = await writeRuntimeBindingModule({
            moduleText: cleanupPlan.moduleText,
            targetPath: cleanupPlan.targetPath,
            hasProjectConnection: !!projectRootDirHandle,
            saveConnectedPath: studioProjectIo.savePath,
            missingConnectionMessage: `Connect Project first. This profile is bound in ${RUNTIME_BINDINGS_TARGET_PATH.join("/")} and deletion needs to clean that file.`,
            failureMessage: "Delete aborted. Binding cleanup failed, so nothing was removed.",
          });
          if (result && result.ok) {
            runtimeEffectBindingsState = cleanupPlan.remainingBindings;
          } else {
            if (result && result.aborted) return;
            if (result && result.error) console.error(result.error);
            if (result && result.message) window.alert(result.message);
            return;
          }
        }

        deleteEffectProfileHelper({
          opt,
          effectSelect: els.effectSelect,
          draftStore,
          persistDraftStore,
          updateEffectSections,
        });
      })();
    }

    function clamp(v, lo, hi){
      v = Number(v);
      if (!isFinite(v)) v = lo;
      return Math.max(lo, Math.min(hi, v));
    }

    function evenPx(n, min = 0, max = 9999){
      n = Math.round(Number(n) || 0);
      n = Math.max(min, Math.min(max, n));
      if (n % 2 === 1) n += 1;
      return n;
    }

    function clampByte(v){
      return Math.max(0, Math.min(255, Math.round(Number(v) || 0)));

    });

    // =========================================================================
    // GEOMETRY (forced even)
    // =========================================================================
    const GEOM = {
      orbD: Math.round(ORB_BASE_VISUAL_DEFAULTS.diameterPx),
      orbStroke: Math.round(ORB_BASE_VISUAL_DEFAULTS.strokeWidthPx),
      shieldD: Math.round((Number(BUBBLE_SHIELD_PRESET_DEFAULT.diameterRatio) || 1.24) * Number(ORB_BASE_VISUAL_DEFAULTS.diameterPx || 100)),
      shieldStroke: Math.max(1, Math.round((Number(BUBBLE_SHIELD_PRESET_DEFAULT.strokeWidthRatio) || 0.04) * Number(ORB_BASE_VISUAL_DEFAULTS.diameterPx || 100))),
    };
    let currentLabOrbBaseVisualState = buildOrbBaseVisualState({
      theme: {
        orb: {
          diameterPx: Number(ORB_BASE_VISUAL_DEFAULTS.diameterPx),
          strokeWidthPx: Number(ORB_BASE_VISUAL_DEFAULTS.strokeWidthPx),
          strokeDefaultRgb: ORB_BASE_VISUAL_DEFAULTS.strokeDefaultRgb,
          strokeAlpha: Number(ORB_BASE_VISUAL_DEFAULTS.strokeAlpha),
          fillDefaultRgb: ORB_BASE_VISUAL_DEFAULTS.fillDefaultRgb,
          fillAlpha: Number(ORB_BASE_VISUAL_DEFAULTS.fillAlpha),
        },
      },
      physics: {
        orbRadiusPx: Number(ORB_BASE_VISUAL_DEFAULTS.radiusPx) || (Number(ORB_BASE_VISUAL_DEFAULTS.diameterPx) * 0.5),
      },
    });
    const PREVIEW_ROOTS_BY_EFFECT = Object.freeze(
      Object.fromEntries(Object.entries(LAB_EFFECT_SURFACES)
        .filter(([, surface]) => surface.previewRootKey && els[surface.previewRootKey])
        .map(([baseEffect, surface]) => [baseEffect, els[surface.previewRootKey]]))
    );
    applyLabThemeDefaults(GAME_THEME_DEFAULT);

    function buildCurrentLabOrbBaseVisualState(){
      return currentLabOrbBaseVisualState || buildOrbBaseVisualState();
    }

    function applyOrbLaneSsot(root, { includeGlobe = false } = {}){
      if (!root) return;
      const orbBaseVisualState = buildCurrentLabOrbBaseVisualState();
      applyOrbBaseVisualCssVars(orbBaseVisualState, { root });
      if (includeGlobe) {
        applyOrbGlobeVisualCssVars(buildOrbGlobeVisualState(), {
          root,
          orbRadiusPx: orbBaseVisualState.radiusPx,
        });
      }
    }

    function applyGeometryVars(){
      GEOM.orbD = evenPx(GEOM.orbD, 2, 2000);
      GEOM.orbStroke = evenPx(GEOM.orbStroke, 2, 40);
      GEOM.shieldD = evenPx(GEOM.shieldD, 2, 2000);
      GEOM.shieldStroke = evenPx(GEOM.shieldStroke, 2, 40);

      applyOrbLaneSsot(els.shieldPreviewRoot);
      applyOrbLaneSsot(els.shockPreviewRoot);
      applyOrbLaneSsot(els.flamePreviewRoot);
      applyOrbLaneSsot(els.electricPreviewRoot);
      setRootVar(els.shieldPreviewRoot, "--shield-d", GEOM.shieldD + "px");
      setRootVar(els.shieldPreviewRoot, "--shield-stroke", GEOM.shieldStroke + "px");
      applyOrbLaneSsot(els.orbBasePreviewRoot);
      applyOrbLaneSsot(els.orbTemplatePreviewRoot);
      applyOrbLaneSsot(els.orbNodPreviewRoot);
      applyOrbLaneSsot(els.orbLifecyclePreviewRoot);
      applyOrbLaneSsot(els.orbGlobePreviewRoot, { includeGlobe: true });
      applyOrbLaneSsot(els.worldGlobePreviewRoot, { includeGlobe: true });
      applyOrbLaneSsot(els.orbTeleportPreviewRoot);
    }
    applyGeometryVars();

    function readTeleportBehaviorPreviewConfig(){
      return authoringAdapterForBaseEffect("teleport").readBehaviorPreviewConfig(els);
    }

    function updateTeleportBehaviorReadout(){
      authoringAdapterForBaseEffect("teleport").updateBehaviorReadout(els);
    }
    const studioBootstrap = createStudioBootstrap({
      els,
      getElementById: $,
      adapterFactoriesByBaseEffect: LAB_AUTHORING_ADAPTER_FACTORIES_BY_BASE_EFFECT,
      adapterContext: AUTHORING_ADAPTER_CONTEXT,
      draftStore,
      lastSelectedEffectValueRef,
      surfaces: LAB_EFFECT_SURFACES,
      liveBehaviorModulesByBaseEffect: LIVE_BEHAVIOR_MODULES_BY_BASE_EFFECT,
      selectedEffectOption,
      selectedBaseEffect,
      settingsKeyForBaseEffect,
      defaultSettingsKeyForBaseEffect,
      refreshEffectMeta,
      refreshBindingPanel,
      alignBindingTargetToSelectedEffect,
      persistDraftStore,
      applyOrbLaneSsot,
      buildCurrentLabOrbBaseVisualState,
      updateTeleportBehaviorReadout,
      applyGeometryVars,
      previewApplyMap: Object.freeze({
        "electric-aoe": () => applyElectricControls(),
        "bubble-shield": () => applyShield(),
        shockwave: () => applyShock(),
        "flame-aoe": () => applyFlameControls(),
        "orb-base": () => applyOrbBase(),
        teleport: () => applyOrbTeleport(),
        "orb-globe": () => applyOrbGlobe(),
        "orb-lifecycle": () => applyOrbLifecycle(),
        "orb-nod": () => applyOrbNod(),
        "world-globe": () => applyWorldGlobe(),
      }),
      previewRootsByEffect: PREVIEW_ROOTS_BY_EFFECT,
      geometry: GEOM,
      defaults: Object.freeze({
        orbBaseVisualDefaults: ORB_BASE_VISUAL_DEFAULTS,
        orbNodPresetDefault: ORB_NOD_PRESET_DEFAULT,
        shockwavePresetDefault: SHOCKWAVE_PRESET_DEFAULT,
        flamePresetDefault: FLAME_AOE_PRESET_DEFAULT,
        electricPresetDefault: ELECTRIC_AOE_PRESET_DEFAULT,
        onOrbBaseVisualStateApplied: (visualState) => {
          currentLabOrbBaseVisualState = visualState || currentLabOrbBaseVisualState;
          GEOM.orbD = evenPx(visualState && visualState.diameterPx, 2, 2000);
          GEOM.orbStroke = evenPx(visualState && visualState.strokeWidthPx, 1, 40);
          applyGeometryVars();
        },
        isDraftHydrationDone: () => draftHydrationDone,
        isCustomEffectOption,
      }),
      clamp,
      evenPx,
      clampByte,
      createScopedVarSetter,
      requestAnimationFrame,
    });
    studioBootstrap.setSuspendDraftApplyRef({
      get value() { return suspendDraftApply; },
      set value(next) { suspendDraftApply = !!next; },
    });
    const {
      applyShieldGeometry,
      applyShield,
      applyPulse,
      playShield,
      applyShock,
      clearShock,
      playShock,
      applyFlameControls,
      clearFlame,
      playFlame,
      applyElectricControls,
      clearElectric,
      playElectric,
      applyOrbBase,
      applyOrbTemplate,
      clearOrbTemplate,
      applyOrbNod,
      clearOrbNod,
      applyOrbLifecycle,
      clearOrbLifecycle,
      applyOrbGlobe,
      clearOrbGlobe,
      applyWorldGlobe,
      clearWorldGlobe,
      applyOrbTeleport,
      clearOrbTeleport,
      playOrbTeleport,
    } = studioBootstrap.actions;
    const stopAllStudioEffects = studioBootstrap.stopAllStudioEffects;
    const authoringAdapterForBaseEffect = studioBootstrap.authoringAdapterForBaseEffect;
    const callAuthoringAdapter = studioBootstrap.callAuthoringAdapter;
    const defaultSettingsForBaseEffect = studioBootstrap.defaultSettingsForBaseEffect;
    const captureCurrentEffectSettings = studioBootstrap.captureCurrentEffectSettings;
    const applyCurrentEffectSettings = studioBootstrap.applyCurrentEffectSettings;
    const updateBehaviorSections = studioBootstrap.updateBehaviorSections;
    const updateEffectSections = studioBootstrap.updateEffectSections;
    const settleSelectedEffectState = studioBootstrap.settleSelectedEffectState;
    requestAnimationFrame(() => {
      if (typeof applyShieldGeometry === "function") applyShieldGeometry();
      if (typeof applyShock === "function") applyShock();
      if (typeof applyFlameControls === "function") applyFlameControls();
      if (typeof applyElectricControls === "function") applyElectricControls();
      if (typeof applyOrbTemplate === "function") applyOrbTemplate();
      if (typeof applyOrbLifecycle === "function") applyOrbLifecycle();
      if (typeof applyOrbGlobe === "function") applyOrbGlobe();
      if (typeof applyWorldGlobe === "function") applyWorldGlobe();
    });
    updateTeleportBehaviorReadout();

    bootStudioShell({
      effectSelect: els.effectSelect,
      loadDraftStore,
      buildEffectLibraryOptionsFromRegistry,
      populateBindingWordOptions: populateBindingTargetOptions,
      setDraftHydrationDone: (value) => { draftHydrationDone = !!value; },
      updateEffectSections,
      newEffectBtn: els.newEffectBtn,
      createCustomEffectProfile,
      saveDraftBtn: els.saveDraftBtn,
      saveDraft,
      connectProjectBtn: els.connectProjectBtn,
      connectProjectFolder: studioProjectIo.connect,
      publishPresetBtn: els.publishPresetBtn,
      publishPreset,
      bindBtn: els.bindBtn,
      publishBinding,
      bindingWordSelect: els.bindingTargetSelect,
      refreshBindingPanel,
      renameEffectBtn: els.renameEffectBtn,
      renameEffectProfile,
      duplicateEffectBtn: els.duplicateEffectBtn,
      duplicateEffectProfile,
      deleteEffectBtn: els.deleteEffectBtn,
      deleteEffectProfile,
      lockEffectBtn: els.lockEffectBtn,
      toggleSelectedEffectLock,
      refreshProjectConnectUi: studioProjectIo.refreshUi,
      refreshLockUi,
      initEffectSections: false,
    });
    requestAnimationFrame(settleSelectedEffectState);

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space"){
        e.preventDefault();
        playShock();
      }
      if (e.key.toLowerCase() === "b"){
        playShield();
      }
      if (e.key.toLowerCase() === "f"){
        playFlame();
      }
      if (e.key.toLowerCase() === "e"){
        playElectric();
      }
    });
  </script>
</body>
</html>

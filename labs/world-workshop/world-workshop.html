<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Workshop</title>
  <link rel="stylesheet" href="../shell/lab-workspaces.css?v=20260425a" />
  <link rel="stylesheet" href="../../src/runtime-shell/ui/staging-ui.css?v=20260410-vfxlab-semantics" />
  <link rel="stylesheet" href="./world-workshop.css?v=20260426g" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main class="workshopShell wrap">
    <header class="studioBar workshopTopbar">
      <div class="studioBarGroup studioWorkspaceGroup">
        <strong class="workshopTitle">WORLD WORKSHOP</strong>
      </div>
      <div class="studioBarGroup workshopItemGroup">
        <label class="studioBarLabel" for="worldItemSelect">item:</label>
        <select id="worldItemSelect" class="itemSelect" data-world-workshop-item-select aria-label="World item"></select>
      </div>
    </header>

    <section class="card workshopViewportCard" aria-label="World object viewport">
      <div class="workshopViewport stage">
        <div class="worldModelPreviewRoot" data-world-workshop-preview-root></div>
        <div class="viewportHud">
          <div>
            <strong data-world-workshop-viewport-label>World Object</strong>
            <span data-world-workshop-meta></span>
          </div>
        </div>
      </div>
    </section>

    <section class="card workshopControls" aria-label="World object controls">
      <article class="controlPane">
        <h2>Geometry</h2>
        <p data-world-workshop-geometry-readout>Pending</p>
      </article>
      <article class="controlPane">
        <h2>Material</h2>
        <p data-world-workshop-material-readout>Pending</p>
      </article>
      <article class="controlPane">
        <h2>Runtime</h2>
        <p data-world-workshop-runtime-readout>Pending</p>
      </article>
    </section>
  </main>
  <script type="module" src="./world-workshop.js?v=20260426j"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enemy Workshop</title>
  <link rel="stylesheet" href="../shell/lab-workspaces.css?v=20260425a" />
  <link rel="stylesheet" href="../shell/lab-ui.css?v=20260515a" />
  <link rel="stylesheet" href="../../src/runtime-shell/ui/staging-ui.css?v=20260410-vfxlab-semantics" />
  <link rel="stylesheet" href="./enemy-workshop.css?v=20260515c" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main class="enemyWorkshopShell wrap">
    <header class="studioBar enemyWorkshopTopbar">
      <div class="studioBarGroup studioWorkspaceGroup">
        <strong class="enemyWorkshopTitle">ENEMY WORKSHOP</strong>
        <nav data-lab-workspace-nav></nav>
      </div>
      <div class="studioBarGroup enemyWorkshopSelectGroup">
        <label class="studioBarLabel" for="enemySelect">Enemy</label>
        <select id="enemySelect" class="enemySelect" data-enemy-workshop-enemy-select aria-label="Enemy"></select>
      </div>
      <div class="studioBarGroup enemyWorkshopActionGroup">
        <button class="toolBtn secondary" type="button" data-enemy-workshop-save>Save</button>
        <button class="toolBtn secondary" type="button" data-enemy-workshop-connect>Connect Project</button>
        <button class="toolBtn secondary" type="button" data-enemy-workshop-publish>Publish</button>
      </div>
    </header>

    <section class="enemyWorkshopMain" aria-label="Enemy authoring workspace">
      <section class="card enemyViewportCard" aria-label="Enemy viewport">
        <div class="enemyViewport stage">
          <div class="enemyPreviewRoot" data-enemy-workshop-preview-root></div>
        </div>
      </section>

      <aside class="card enemySidebar" aria-label="Enemy controls">
        <div class="enemySidebarHeader">
          <strong>Authoring</strong>
          <span data-enemy-workshop-action-status>Ready</span>
        </div>

        <div class="authoringTabs" role="tablist" aria-label="Enemy authoring surface">
          <button class="authoringTab active" type="button" role="tab" aria-selected="true" data-authoring-tab="gnat">Gnat</button>
          <button class="authoringTab" type="button" role="tab" aria-selected="false" data-authoring-tab="swarm">Swarm</button>
        </div>

        <div class="authoringPanel" data-authoring-panel="gnat">
          <section class="controlGroup">
            <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="false" aria-controls="gnatIdleControls">Idle Flight</button>
            <div id="gnatIdleControls" class="controlGroupBody" hidden>
              <div class="rangeFieldRows">
                <label class="rangeFieldRow">Retarget sec <input class="paramFieldInput" type="number" min="0" step="0.05" placeholder="min" aria-label="Retarget min seconds" data-gnat-setting="gnat.idle.targetRetargetMinSec" /><input class="paramFieldInput" type="number" min="0" step="0.05" placeholder="max" aria-label="Retarget max seconds" data-gnat-setting="gnat.idle.targetRetargetMaxSec" /></label>
                <label class="rangeFieldRow">Target jitter BO <input class="paramFieldInput" type="number" min="0" step="0.05" data-gnat-range="gnat.idle.targetJitterBo.0" /><input class="paramFieldInput" type="number" min="0" step="0.05" data-gnat-range="gnat.idle.targetJitterBo.1" /></label>
                <label class="rangeFieldRow">Spring stiffness <input class="paramFieldInput" type="number" min="0.1" step="0.1" data-gnat-range="gnat.idle.springStiffness.0" /><input class="paramFieldInput" type="number" min="0.1" step="0.1" data-gnat-range="gnat.idle.springStiffness.1" /></label>
                <label class="rangeFieldRow">Spring damping <input class="paramFieldInput" type="number" min="0" step="0.1" data-gnat-range="gnat.idle.springDamping.0" /><input class="paramFieldInput" type="number" min="0" step="0.1" data-gnat-range="gnat.idle.springDamping.1" /></label>
                <label class="rangeFieldRow">Elastic jitter BO <input class="paramFieldInput" type="number" min="0" step="0.01" data-gnat-range="gnat.idle.elasticJitterBo.0" /><input class="paramFieldInput" type="number" min="0" step="0.01" data-gnat-range="gnat.idle.elasticJitterBo.1" /></label>
                <label class="rangeFieldRow">Elastic jitter Hz <input class="paramFieldInput" type="number" min="0" step="0.1" data-gnat-range="gnat.idle.elasticJitterHz.0" /><input class="paramFieldInput" type="number" min="0" step="0.1" data-gnat-range="gnat.idle.elasticJitterHz.1" /></label>
              </div>
            </div>
          </section>

          <section class="controlGroup">
            <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="false" aria-controls="gnatPersonalityControls">Personality</button>
            <div id="gnatPersonalityControls" class="controlGroupBody" hidden>
              <div class="rangeFieldRows">
                <label class="rangeFieldRow">Speed X <input class="paramFieldInput" type="number" min="0.05" max="8" step="0.05" data-gnat-range="gnat.personalityRanges.speed.0" /><input class="paramFieldInput" type="number" min="0.05" max="8" step="0.05" data-gnat-range="gnat.personalityRanges.speed.1" /></label>
                <label class="rangeFieldRow">WanderChance/min <input class="paramFieldInput" type="number" min="0" max="120" step="1" data-gnat-range="gnat.personalityRanges.wanderChancePerMinute.0" /><input class="paramFieldInput" type="number" min="0" max="120" step="1" data-gnat-range="gnat.personalityRanges.wanderChancePerMinute.1" /></label>
                <label class="rangeFieldRow">Cooldown sec <input class="paramFieldInput" type="number" min="0" max="60" step="0.1" data-gnat-range="gnat.personalityRanges.wanderCooldownSec.0" /><input class="paramFieldInput" type="number" min="0" max="120" step="0.1" data-gnat-range="gnat.personalityRanges.wanderCooldownSec.1" /></label>
                <label class="rangeFieldRow">Wander BO <input class="paramFieldInput" type="number" min="0" step="0.1" data-gnat-range="gnat.personalityRanges.wanderRangeBo.0" /><input class="paramFieldInput" type="number" min="0" step="0.1" data-gnat-range="gnat.personalityRanges.wanderRangeBo.1" /></label>
                <label class="paramFieldRow">Wander Curve <input class="paramFieldInput" type="number" min="-1" max="1" step="0.01" data-gnat-setting="gnat.personalityRanges.wanderCurve" /></label>
                <label class="rangeFieldRow">Segment spacing BO <input class="paramFieldInput" type="number" min="0.2" max="24" step="0.1" data-gnat-range="gnat.personalityRanges.wanderSegmentSpacingBo.0" /><input class="paramFieldInput" type="number" min="0.2" max="32" step="0.1" data-gnat-range="gnat.personalityRanges.wanderSegmentSpacingBo.1" /></label>
                <label class="rangeFieldRow">Return spacing BO <input class="paramFieldInput" type="number" min="0.2" max="24" step="0.1" data-gnat-range="gnat.personalityRanges.returnSegmentSpacingBo.0" /><input class="paramFieldInput" type="number" min="0.2" max="32" step="0.1" data-gnat-range="gnat.personalityRanges.returnSegmentSpacingBo.1" /></label>
                <label class="rangeFieldRow">Segment jitter BO <input class="paramFieldInput" type="number" min="0" max="12" step="0.1" data-gnat-range="gnat.personalityRanges.wanderSegmentJitterBo.0" /><input class="paramFieldInput" type="number" min="0" max="16" step="0.1" data-gnat-range="gnat.personalityRanges.wanderSegmentJitterBo.1" /></label>
                <label class="rangeFieldRow">Segment dwell sec <input class="paramFieldInput" type="number" min="0" max="8" step="0.05" data-gnat-range="gnat.personalityRanges.segmentDwellSec.0" /><input class="paramFieldInput" type="number" min="0" max="12" step="0.05" data-gnat-range="gnat.personalityRanges.segmentDwellSec.1" /></label>
                <label class="rangeFieldRow">Route commit <input class="paramFieldInput" type="number" min="0" max="1" step="0.01" data-gnat-range="gnat.personalityRanges.routeCommitment.0" /><input class="paramFieldInput" type="number" min="0" max="1" step="0.01" data-gnat-range="gnat.personalityRanges.routeCommitment.1" /></label>
                <label class="rangeFieldRow">Arrival BO <input class="paramFieldInput" type="number" min="0.05" max="4" step="0.05" data-gnat-range="gnat.personalityRanges.arrivalRadiusBo.0" /><input class="paramFieldInput" type="number" min="0.05" max="4" step="0.05" data-gnat-range="gnat.personalityRanges.arrivalRadiusBo.1" /></label>
                <label class="rangeFieldRow">Return bias <input class="paramFieldInput" type="number" min="0" max="1" step="0.01" data-gnat-range="gnat.personalityRanges.returnBias.0" /><input class="paramFieldInput" type="number" min="0" max="1" step="0.01" data-gnat-range="gnat.personalityRanges.returnBias.1" /></label>
                <label class="rangeFieldRow">Return speed x <input class="paramFieldInput" type="number" min="0" max="4" step="0.05" data-gnat-range="gnat.personalityRanges.returnSpeedMultiplier.0" /><input class="paramFieldInput" type="number" min="0" max="4" step="0.05" data-gnat-range="gnat.personalityRanges.returnSpeedMultiplier.1" /></label>
                <label class="rangeFieldRow">Linger sec <input class="paramFieldInput" type="number" min="0" max="30" step="0.1" data-gnat-range="gnat.personalityRanges.lingerSec.0" /><input class="paramFieldInput" type="number" min="0" max="60" step="0.1" data-gnat-range="gnat.personalityRanges.lingerSec.1" /></label>
                <label class="rangeFieldRow">Awareness <input class="paramFieldInput" type="number" step="0.01" data-gnat-range="gnat.personalityRanges.awareness.0" /><input class="paramFieldInput" type="number" step="0.01" data-gnat-range="gnat.personalityRanges.awareness.1" /></label>
                <label class="rangeFieldRow">Aggression <input class="paramFieldInput" type="number" step="0.01" data-gnat-range="gnat.personalityRanges.aggression.0" /><input class="paramFieldInput" type="number" step="0.01" data-gnat-range="gnat.personalityRanges.aggression.1" /></label>
              </div>
            </div>
          </section>
        </div>

        <div class="authoringPanel" data-authoring-panel="swarm" hidden>
          <section class="controlGroup">
            <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="false" aria-controls="swarmControls">Swarm</button>
            <div id="swarmControls" class="controlGroupBody" hidden>
              <div class="paramFieldRows">
                <label class="paramFieldRow">Gnats total <input class="paramFieldInput" type="number" min="1" max="240" step="1" data-gnat-setting="swarm.gnatsTotal" /></label>
                <label class="paramFieldRow">Spawn BO <input class="paramFieldInput" type="number" min="0.2" max="24" step="0.1" data-gnat-setting="swarm.spawnRadiusBo" /></label>
                <label class="paramFieldRow">Gnat size BO <input class="paramFieldInput" type="number" min="0.005" max="1" step="0.005" data-gnat-setting="swarm.gnatSizeBo" /></label>
                <label class="paramFieldRow">Base speed BO/s <input class="paramFieldInput" type="number" min="0.1" max="320" step="0.1" data-gnat-setting="swarm.baseSpeedBoPerSec" /></label>
              </div>
            </div>
          </section>

          <section class="controlGroup">
            <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="false" aria-controls="detectControls">Detect</button>
            <div id="detectControls" class="controlGroupBody" hidden>
              <div class="paramFieldRows">
                <label class="paramFieldRow">Detection BO <input class="paramFieldInput" type="number" min="0" max="120" step="0.1" data-gnat-setting="swarm.detectionRadiusBo" /></label>
                <label class="paramFieldRow">Detection chance <input class="paramFieldInput" type="number" min="0" max="1" step="0.01" data-gnat-setting="swarm.detectionBaseChance" /></label>
                <label class="paramFieldRow">Detection check sec <input class="paramFieldInput" type="number" min="0.1" max="10" step="0.1" data-gnat-setting="swarm.detectionCheckSec" /></label>
                <label class="paramFieldRow">Leash chase BO <input class="paramFieldInput" type="number" min="0" max="1000" step="0.5" data-gnat-setting="swarm.leashChaseBo" /></label>
                <label class="rangeFieldRow">Leash feed BO <input class="paramFieldInput" type="number" min="0" max="1000" step="0.5" data-gnat-range="swarm.leashFeedBo.0" /><input class="paramFieldInput" type="number" min="0" max="1000" step="0.5" data-gnat-range="swarm.leashFeedBo.1" /></label>
                <label class="paramFieldRow">Signal BO <input class="paramFieldInput" type="number" min="0" max="160" step="0.1" data-gnat-setting="swarm.signalRadiusBo" /></label>
                <label class="paramFieldRow">Signal chance <input class="paramFieldInput" type="number" min="0" max="1" step="0.01" data-gnat-setting="swarm.signalBaseChance" /></label>
                <label class="paramFieldRow">Signal decay <input class="paramFieldInput" type="number" min="0" max="1" step="0.01" data-gnat-setting="swarm.signalDecay" /></label>
                <label class="paramFieldRow">Signal hops <input class="paramFieldInput" type="number" min="0" max="12" step="1" data-gnat-setting="swarm.signalHops" /></label>
              </div>
            </div>
          </section>

          <section class="controlGroup">
            <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="false" aria-controls="feedControls">Feed</button>
            <div id="feedControls" class="controlGroupBody" hidden>
              <div class="paramFieldRows">
                <label class="paramFieldRow">Feed offset BO <input class="paramFieldInput" type="number" min="-1" max="4" step="0.01" data-gnat-setting="swarm.feedOffsetBo" /></label>
                <label class="paramFieldRow">Feed nip BO <input class="paramFieldInput" type="number" min="0" max="4" step="0.01" data-gnat-setting="swarm.feedNipDepthBo" /></label>
                <label class="paramFieldRow">Feed nip Hz <input class="paramFieldInput" type="number" min="0" max="40" step="0.1" data-gnat-setting="swarm.feedNipHz" /></label>
                <label class="paramFieldRow">Feed stickiness <input class="paramFieldInput" type="number" min="0" max="1" step="0.01" data-gnat-setting="swarm.feedStickiness" /></label>
                <label class="paramFieldRow">Feed latch drift <input class="paramFieldInput" type="number" min="0" max="0.08" step="0.001" data-gnat-setting="swarm.feedLatchDrift" /></label>
              </div>
            </div>
          </section>
        </div>
      </aside>
    </section>
  </main>
  <script type="module" src="./enemy-workshop.js?v=20260515g"></script>
</body>
</html>

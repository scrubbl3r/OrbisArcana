<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enemy Workshop</title>
  <link rel="stylesheet" href="../shell/lab-workspaces.css?v=20260425a" />
  <link rel="stylesheet" href="../../src/runtime-shell/ui/staging-ui.css?v=20260410-vfxlab-semantics" />
  <link rel="stylesheet" href="./enemy-workshop.css?v=20260513a" />
</head>
<body>
  <main class="enemyWorkshopShell wrap">
    <header class="studioBar enemyWorkshopTopbar">
      <div class="studioBarGroup studioWorkspaceGroup">
        <strong class="enemyWorkshopTitle">ENEMY WORKSHOP</strong>
        <nav data-lab-workspace-nav></nav>
      </div>
      <div class="studioBarGroup enemyWorkshopSelectGroup">
        <label class="studioBarLabel" for="enemySelect">Enemy</label>
        <select id="enemySelect" class="enemySelect" data-enemy-workshop-enemy-select aria-label="Enemy"></select>
      </div>
      <div class="studioBarGroup enemyWorkshopActionGroup">
        <button class="toolBtn secondary" type="button" data-enemy-workshop-save>Save</button>
        <button class="toolBtn secondary" type="button" data-enemy-workshop-connect>Connect Project</button>
        <button class="toolBtn secondary" type="button" data-enemy-workshop-publish>Publish</button>
      </div>
    </header>

    <section class="enemyWorkshopMain" aria-label="Enemy authoring workspace">
      <section class="card enemyViewportCard" aria-label="Enemy viewport">
        <div class="enemyViewport stage">
          <div class="enemyPreviewRoot" data-enemy-workshop-preview-root></div>
          <div class="viewportHud">
            <div>
              <strong data-enemy-workshop-viewport-label>Enemy</strong>
              <span data-enemy-workshop-meta></span>
            </div>
          </div>
        </div>
      </section>

      <aside class="card enemySidebar" aria-label="Enemy controls">
        <div class="enemySidebarHeader">
          <strong>Authoring</strong>
          <span data-enemy-workshop-action-status>Ready</span>
        </div>

        <section class="controlGroup">
          <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="true" aria-controls="enemyBehaviorControls">Behavior</button>
          <div id="enemyBehaviorControls" class="controlGroupBody">
            <p data-enemy-workshop-behavior-readout>Pending</p>
          </div>
        </section>

        <section class="controlGroup">
          <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="true" aria-controls="enemyPersonalityControls">Personality</button>
          <div id="enemyPersonalityControls" class="controlGroupBody">
            <p data-enemy-workshop-personality-readout>Pending</p>
          </div>
        </section>

        <section class="controlGroup">
          <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="true" aria-controls="enemySpawnControls">Spawn</button>
          <div id="enemySpawnControls" class="controlGroupBody">
            <p data-enemy-workshop-spawn-readout>Pending</p>
          </div>
        </section>

        <section class="controlGroup">
          <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="false" aria-controls="enemyRuntimeControls">Runtime</button>
          <div id="enemyRuntimeControls" class="controlGroupBody">
            <p data-enemy-workshop-runtime-readout>Pending</p>
          </div>
        </section>
      </aside>
    </section>
  </main>
  <script type="module" src="./enemy-workshop.js?v=20260513a"></script>
</body>
</html>

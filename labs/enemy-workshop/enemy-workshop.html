<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enemy Workshop</title>
  <link rel="stylesheet" href="../shell/lab-workspaces.css?v=20260425a" />
  <link rel="stylesheet" href="../../src/runtime-shell/ui/staging-ui.css?v=20260410-vfxlab-semantics" />
  <link rel="stylesheet" href="./enemy-workshop.css?v=20260513a" />
</head>
<body>
  <main class="enemyWorkshopShell wrap">
    <header class="studioBar enemyWorkshopTopbar">
      <div class="studioBarGroup studioWorkspaceGroup">
        <strong class="enemyWorkshopTitle">ENEMY WORKSHOP</strong>
        <nav data-lab-workspace-nav></nav>
      </div>
      <div class="studioBarGroup enemyWorkshopSelectGroup">
        <label class="studioBarLabel" for="enemySelect">Enemy</label>
        <select id="enemySelect" class="enemySelect" data-enemy-workshop-enemy-select aria-label="Enemy"></select>
      </div>
      <div class="studioBarGroup enemyWorkshopActionGroup">
        <button class="toolBtn secondary" type="button" data-enemy-workshop-save>Save</button>
        <button class="toolBtn secondary" type="button" data-enemy-workshop-connect>Connect Project</button>
        <button class="toolBtn secondary" type="button" data-enemy-workshop-publish>Publish</button>
      </div>
    </header>

    <section class="enemyWorkshopMain" aria-label="Enemy authoring workspace">
      <section class="card enemyViewportCard" aria-label="Enemy viewport">
        <div class="enemyViewport stage">
          <div class="enemyPreviewRoot" data-enemy-workshop-preview-root></div>
          <div class="viewportHud">
            <div>
              <strong data-enemy-workshop-viewport-label>Enemy</strong>
              <span data-enemy-workshop-meta></span>
            </div>
          </div>
        </div>
      </section>

      <aside class="card enemySidebar" aria-label="Enemy controls">
        <div class="enemySidebarHeader">
          <strong>Authoring</strong>
          <span data-enemy-workshop-action-status>Ready</span>
        </div>

        <div class="authoringTabs" role="tablist" aria-label="Enemy authoring surface">
          <button class="authoringTab active" type="button" role="tab" aria-selected="true">Gnat</button>
        </div>

        <section class="controlGroup">
          <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="true" aria-controls="gnatIdleControls">Idle Flight</button>
          <div id="gnatIdleControls" class="controlGroupBody">
            <div class="paramFieldRows">
              <label class="paramFieldRow">Idle radius BO <input class="paramFieldInput" type="number" min="0.2" max="12" step="0.1" data-gnat-setting="idle.idleRadiusBo" /></label>
              <label class="paramFieldRow">Base speed BO/s <input class="paramFieldInput" type="number" min="0.1" max="8" step="0.05" data-gnat-setting="idle.baseSpeedBoPerSec" /></label>
              <label class="paramFieldRow">Max speed BO/s <input class="paramFieldInput" type="number" min="0.1" max="16" step="0.1" data-gnat-setting="idle.maxSpeedBoPerSec" /></label>
              <label class="paramFieldRow">Retarget min sec <input class="paramFieldInput" type="number" min="0.05" max="8" step="0.05" data-gnat-setting="idle.targetRetargetMinSec" /></label>
              <label class="paramFieldRow">Retarget max sec <input class="paramFieldInput" type="number" min="0.05" max="16" step="0.05" data-gnat-setting="idle.targetRetargetMaxSec" /></label>
              <label class="paramFieldRow">Target jitter BO <input class="paramFieldInput" type="number" min="0" max="4" step="0.05" data-gnat-setting="idle.targetJitterBo" /></label>
              <label class="paramFieldRow">Spring stiffness <input class="paramFieldInput" type="number" min="0.1" max="80" step="0.1" data-gnat-setting="idle.springStiffness" /></label>
              <label class="paramFieldRow">Spring damping <input class="paramFieldInput" type="number" min="0" max="30" step="0.1" data-gnat-setting="idle.springDamping" /></label>
              <label class="paramFieldRow">Elastic jitter BO <input class="paramFieldInput" type="number" min="0" max="2" step="0.01" data-gnat-setting="idle.elasticJitterBo" /></label>
              <label class="paramFieldRow">Elastic jitter Hz <input class="paramFieldInput" type="number" min="0" max="40" step="0.1" data-gnat-setting="idle.elasticJitterHz" /></label>
            </div>
            <p data-enemy-workshop-behavior-readout>Pending</p>
          </div>
        </section>

        <section class="controlGroup">
          <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="true" aria-controls="gnatWanderControls">Wander</button>
          <div id="gnatWanderControls" class="controlGroupBody">
            <div class="paramFieldRows">
              <label class="paramFieldRow">Chance/min <input class="paramFieldInput" type="number" min="0" max="120" step="1" data-gnat-setting="wander.chancePerMinute" /></label>
              <label class="paramFieldRow">Cooldown min sec <input class="paramFieldInput" type="number" min="0" max="60" step="0.1" data-gnat-setting="wander.cooldownMinSec" /></label>
              <label class="paramFieldRow">Cooldown max sec <input class="paramFieldInput" type="number" min="0" max="120" step="0.1" data-gnat-setting="wander.cooldownMaxSec" /></label>
              <label class="paramFieldRow">Range min BO <input class="paramFieldInput" type="number" min="0.2" max="20" step="0.1" data-gnat-setting="wander.rangeMinBo" /></label>
              <label class="paramFieldRow">Range max BO <input class="paramFieldInput" type="number" min="0.2" max="24" step="0.1" data-gnat-setting="wander.rangeMaxBo" /></label>
              <label class="paramFieldRow">Outbound bias <input class="paramFieldInput" type="number" min="0" max="1" step="0.01" data-gnat-setting="wander.outboundBias" /></label>
              <label class="paramFieldRow">Arrival radius BO <input class="paramFieldInput" type="number" min="0.05" max="4" step="0.05" data-gnat-setting="wander.arrivalRadiusBo" /></label>
              <label class="paramFieldRow">Return bias <input class="paramFieldInput" type="number" min="0" max="1" step="0.01" data-gnat-setting="wander.returnBias" /></label>
              <label class="paramFieldRow">Return speed x <input class="paramFieldInput" type="number" min="0.1" max="4" step="0.05" data-gnat-setting="wander.returnSpeedMultiplier" /></label>
              <label class="paramFieldRow">Linger min sec <input class="paramFieldInput" type="number" min="0" max="30" step="0.1" data-gnat-setting="wander.lingerMinSec" /></label>
              <label class="paramFieldRow">Linger max sec <input class="paramFieldInput" type="number" min="0" max="60" step="0.1" data-gnat-setting="wander.lingerMaxSec" /></label>
            </div>
            <p data-enemy-workshop-spawn-readout>Pending</p>
          </div>
        </section>

        <section class="controlGroup">
          <button class="controlGroupHeader" type="button" data-control-toggle aria-expanded="true" aria-controls="gnatPersonalityControls">Personality</button>
          <div id="gnatPersonalityControls" class="controlGroupBody">
            <div class="rangeFieldRows">
              <label class="rangeFieldRow">Speed <input class="paramFieldInput" type="number" step="0.01" data-gnat-range="personalityRanges.speed.0" /><input class="paramFieldInput" type="number" step="0.01" data-gnat-range="personalityRanges.speed.1" /></label>
              <label class="rangeFieldRow">Wander chance <input class="paramFieldInput" type="number" step="0.01" data-gnat-range="personalityRanges.wanderChance.0" /><input class="paramFieldInput" type="number" step="0.01" data-gnat-range="personalityRanges.wanderChance.1" /></label>
              <label class="rangeFieldRow">Wander range <input class="paramFieldInput" type="number" step="0.01" data-gnat-range="personalityRanges.wanderRange.0" /><input class="paramFieldInput" type="number" step="0.01" data-gnat-range="personalityRanges.wanderRange.1" /></label>
              <label class="rangeFieldRow">Awareness <input class="paramFieldInput" type="number" step="0.01" data-gnat-range="personalityRanges.awareness.0" /><input class="paramFieldInput" type="number" step="0.01" data-gnat-range="personalityRanges.awareness.1" /></label>
              <label class="rangeFieldRow">Aggression <input class="paramFieldInput" type="number" step="0.01" data-gnat-range="personalityRanges.aggression.0" /><input class="paramFieldInput" type="number" step="0.01" data-gnat-range="personalityRanges.aggression.1" /></label>
            </div>
            <p data-enemy-workshop-personality-readout>Pending</p>
          </div>
        </section>
      </aside>
    </section>
  </main>
  <script type="module" src="./enemy-workshop.js?v=20260513a"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orbis Arcana Staging Shell</title>
  <link rel="stylesheet" href="../../ui/staging-ui.css?v=20260421a" />
  <link rel="stylesheet" href="./staging-shell.css?v=20260430a" />
  <link rel="stylesheet" href="../dev-staging/dev-staging.css?v=20260421i" />
  <link rel="stylesheet" href="../orb-stage/orb-stage.css?v=20260424b" />
  <link rel="stylesheet" href="../game-stage/game-stage.css?v=20260428d" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
      }
    }
  </script>
  <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
  <script src="../../../../qrcode.min.js"></script>
</head>
<body>
  <div id="shellOnboardingOverlay" class="shellOnboardingOverlay" aria-hidden="true"></div>
  <div id="shellBootBanner" class="shellBootBanner runtimeShellStatusCard" data-state="booting" data-collapsed="false" aria-live="polite">
    <div class="shellBootHead">
      <div class="shellBootLoaderWrap" aria-hidden="true">
        <div id="shellBootLoader" class="shellBootLoader"></div>
      </div>
      <div id="shellBootPhase" class="shellBootPhase">html-loaded</div>
      <button id="shellBootCollapse" class="shellBootCollapse runtimeShellToolButton" type="button" aria-label="Collapse boot status" aria-expanded="true">-</button>
    </div>
    <div id="shellBootDetail" class="shellBootDetail">Staging shell page mounted</div>
  </div>
  <div id="shellBootReadyChip" class="shellBootReadyChip" data-state="booting" hidden>RUNTIME READY</div>

  <div id="startScreen" class="shellStartScreen off" aria-label="Staging shell pairing screen" aria-hidden="true">
    <div class="shellStartCard">
      <div id="startQr" class="shellQrBox shellStartQrBox"></div>
    </div>
  </div>

  <main class="stagingShell">
    <section id="shellSurface" class="shellGrid" aria-label="Composite staging surface">
      <div id="devStagingMount" class="shellMount shellMountDev" aria-label="Dev staging mount"></div>
      <div id="orbStageMount" class="shellMount shellMountOrb" aria-label="Orb stage mount"></div>
      <div id="gameStageMount" class="shellMount shellMountGame" aria-label="Game stage mount"></div>
    </section>
  </main>
  <div id="shellPerfTraceControls" class="shellPerfTraceControls" aria-label="Performance trace controls">
    <button id="shellPerfTraceReset" class="shellPerfTraceButton" type="button">Reset</button>
    <button id="shellPerfTraceCapture" class="shellPerfTraceButton" type="button">Capture</button>
  </div>

  <div id="calibOverlay" class="shellCalibOverlay off" aria-hidden="true">
    <div class="shellCalibCard" role="dialog" aria-label="Calibration">
      <div class="shellCalibText">Place phone flat on desk.<br>Align top edge of phone to bottom edge of laptop and press CALIBRATE.</div>
      <button id="calibBtn" class="shellCalibBtn" type="button" disabled>CALIBRATE</button>
      <div id="calibStatus" class="shellCalibStatus">Waiting for phone…</div>
    </div>
  </div>

  <script type="module" src="./staging-shell.js?v=20260507p"></script>
</body>
</html>

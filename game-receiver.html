<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orb Relay — Archived Legacy Receiver</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050506;
      --panel: #0d0d10;
      --border: rgba(255,255,255,.12);
      --text: #e8e8ec;
      --muted: #8b8b93;
      --accent: #7dd35f;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text);
    }

    a.primary {
      border-color: rgba(125,211,95,.45);
      color: var(--accent);
    }

    code {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Archived Legacy Receiver</h1>
    <p>This page is no longer an active host.</p>
    <p>The primary harness is now <code>staging-shell.html</code>. The old root receiver has been archived and is being removed from the runtime path.</p>
    <div class="actions">
      <a class="primary" href="./src/runtime-shell/staging/staging-shell/staging-shell.html">Open Staging Shell</a>
      <a href="./index.html">Open Project Launcher</a>
    </div>
  </main>
</body>
</html>
